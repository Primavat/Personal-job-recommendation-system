services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: job_recommendation_db
    environment:
      POSTGRES_USER: job_user
      POSTGRES_PASSWORD: job_password
      POSTGRES_DB: job_recommendations
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_user -d job_recommendations"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - job-network

  # Backend API (FastAPI)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: job_recommendation_api
    environment:
      DATABASE_URL: postgresql://job_user:job_password@postgres:5432/job_recommendations
      ENVIRONMENT: development
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - job-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  job-network:
    driver: bridge
